<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Séries - TVMaze</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Catálogo de Séries</h1>
    </header>

    <main>
        <section class="busca-section">
            <div class="card busca-card">
                <h2>Buscar Séries</h2>
                <div class="busca-container">
                    <input type="text" id="campoBusca" placeholder="Filtrar por nome da série...">
                    <button id="btnBuscar">Buscar</button>
                </div>
            </div>
        </section>

        <section class="series-section">
            <div class="card">
                <h2>Resultados</h2>
                <div id="mensagem" class="mensagem"></div>
                <div id="listaSeries" class="lista-series"></div>
            </div>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
